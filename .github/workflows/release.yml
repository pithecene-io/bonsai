name: 📦 Release

on:
  push:
    tags: [v*]

permissions:
  contents: read

jobs:
  tag_check:
    name: 🔎 Tag Check
    runs-on: ubuntu-latest
    outputs:
      semver_match: ${{ steps.regex-match.outputs.match }}
    steps:
      - name: 🔎 Match SemVer Tag
        uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        with:
          text: ${{ github.ref_name }}
          regex: ^v[0-9]+\.[0-9]+\.[0-9]+$

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [tag_check]
    if: ${{ needs.tag_check.outputs.semver_match != '' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 🏗️ Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: 'v2.14.1'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬆️ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  hold:
    name: ⏸️ Release Approval
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: release
    steps:
      - name: ✅ Await Approval
        run: echo "Release approved; continuing."

  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [hold]
    permissions:
      contents: write
    steps:
      - name: ⬇️ Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: 🚀 Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          draft: true
          body: |
            <!-- Replace this with the release body per CONTRACT_RELEASE.md -->
            **TODO: Add release notes before publishing**
          files: |
            dist/*.tar.gz
            dist/checksums.txt
